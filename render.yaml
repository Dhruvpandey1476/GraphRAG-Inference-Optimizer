services:
  - type: web
    name: graphrag-backend
    env: python
    plan: free
    runtime: python-3.11
    
    buildCommand: |
      apt-get update && apt-get install -y nodejs npm
      pip install -r requirements.txt
      cd frontend && npm install && npm run build && cd ..
    
    startCommand: |
      python scripts/deploy_startup.py && \
      uvicorn backend.api.server:app --host 0.0.0.0 --port $PORT
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      
      - key: ENVIRONMENT
        value: production
      
      - key: LOG_LEVEL
        value: info
      
      - key: TIGERGRAPH_HOST
        sync: false
      
      - key: TIGERGRAPH_GRAPH
        value: GraphRAGDemo
      
      - key: TIGERGRAPH_USERNAME
        sync: false
      
      - key: TIGERGRAPH_PASSWORD
        sync: false
      
      - key: TIGERGRAPH_SECRET
        sync: false
      
      - key: GOOGLE_API_KEY
        sync: false
      
      - key: LLM_MODEL
        value: gemini-2.0-flash
      
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      
      - key: DATA_PATH
        value: /var/data/arxiv_bulk
      
      - key: CACHE_DIR
        value: /var/cache/graphrag
    
    # Health check
    healthCheckPath: /health
    healthCheckInterval: 30
    
    # Disk needs for data (~4GB)
    disk:
      name: arxiv-data
      mountPath: /var/data
      sizeGB: 50
    
    # Autoscaling
    autoDeploy: true
    maxInstances: 1

databases:
  - name: faiss-cache
    plan: free
    
env_whitelist:
  - TIGERGRAPH_HOST
  - TIGERGRAPH_USERNAME
  - TIGERGRAPH_PASSWORD
  - TIGERGRAPH_SECRET
  - GOOGLE_API_KEY
  - ENVIRONMENT
